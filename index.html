<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Sketchbook Diary (Hardcover v3.1)</title>

  <style>
    :root{
      --paper:#fff7ea;
      --paper2:#f6ecd6;
      --ink:#1f1f1f;
      --muted:#6b6b6b;
      --accent:#b3122d;
      --shadow: 0 22px 60px rgba(0,0,0,.26);
      --pagePadding: 22px;
      --font: ui-serif, Georgia, "Times New Roman", serif;
      --ui: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      color:var(--ink);
      font-family: var(--ui);
      background: radial-gradient(1200px 700px at 50% 20%, #fffaf0 0%, #f4f1ea 55%, #ebe7de 100%);
    }

    header{
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(255,255,255,.88);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(0,0,0,.08);
    }

    .bar{
      max-width: 1120px;
      margin: 0 auto;
      padding: 12px 16px;
      display:flex;
      gap: 10px;
      align-items:center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .title{
      display:flex; gap:10px; align-items:baseline;
    }
    .title h1{
      font-size: 16px; margin:0; font-weight: 800;
      letter-spacing: .02em;
    }
    .title span{
      font-size: 12px; color: var(--muted);
    }

    .controls{
      display:flex; gap:8px; flex-wrap: wrap; align-items:center;
    }

    button, .fileLabel, .rangeWrap{
      font-family: var(--ui);
      font-size: 13px;
      border: 1px solid rgba(0,0,0,.12);
      background: white;
      padding: 8px 10px;
      border-radius: 999px;
      cursor:pointer;
      transition: transform .05s ease, background .15s ease;
      user-select:none;
      display:inline-flex;
      align-items:center;
      gap:8px;
    }
    button:active{ transform: translateY(1px); }
    button.primary{
      background: var(--accent);
      border-color: rgba(0,0,0,.08);
      color: white;
    }
    button.ghost{ background: transparent; }
    button.danger{
      background: #fff5f5;
      border-color: rgba(179,18,45,.25);
      color: #8a0e23;
    }
    button:disabled{
      opacity:.5;
      cursor:not-allowed;
    }
    .fileLabel{ cursor:pointer; }
    input[type="file"]{ display:none; }

    .rangeWrap{
      cursor: default;
      gap:10px;
      padding: 8px 12px;
    }
    .rangeWrap label{
      font-size:12px;
      color: rgba(0,0,0,.65);
      font-weight:700;
    }
    .rangeWrap input[type="range"]{
      width: 110px;
    }

    main{
      max-width: 1120px;
      margin: 22px auto 50px;
      padding: 0 16px;
    }

    .hint{
      color: var(--muted);
      font-size: 13px;
      margin: 0 0 14px;
      line-height: 1.4;
    }

    /* ===== Scene (desk + warm light) ===== */
    .bookWrap{
      display:flex;
      justify-content:center;
      align-items:center;
      gap: 14px;
      flex-direction: column;
    }

    .scene{
      display:flex;
      justify-content:center;
      align-items:center;
      padding: 18px 0 10px;
      perspective: 1200px;
    }

    .desk{
      width: min(1040px, 100%);
      padding: 46px 34px 62px;
      border-radius: 28px;
      position: relative;
      box-shadow: 0 28px 70px rgba(0,0,0,.28);
      overflow: hidden;

      display:flex;
      justify-content:center;
      align-items:center;

      background:
        radial-gradient(900px 520px at 70% 10%, rgba(255,220,160,.22), transparent 60%),
        radial-gradient(600px 420px at 85% 25%, rgba(255,230,180,.16), transparent 55%),
        linear-gradient(180deg, rgba(255,255,255,.06), transparent 30%),
        repeating-linear-gradient(90deg,
          rgba(0,0,0,.10) 0px, rgba(0,0,0,.10) 2px,
          rgba(255,255,255,.04) 3px, rgba(255,255,255,.04) 6px
        ),
        linear-gradient(135deg, #251a16 0%, #3b2a22 45%, #1c1411 100%);
    }

    /* Stronger afternoon sunbeam (above book + Safari-friendly) */
    .desk::before{
      content:"";
      position:absolute;
      inset:-120px -160px;
      background:
        radial-gradient(900px 520px at 78% 12%, rgba(255,220,150,.32), transparent 62%),
        linear-gradient(120deg,
          rgba(255,235,190,0) 0%,
          rgba(255,235,190,.26) 18%,
          rgba(255,235,190,0) 44%
        ),
        linear-gradient(120deg,
          rgba(255,235,190,0) 0%,
          rgba(255,235,190,.18) 24%,
          rgba(255,235,190,0) 52%
        );
      transform: rotate(-7deg);
      pointer-events:none;
      z-index: 5;
      mix-blend-mode: soft-light;
      opacity: .95;
      filter: blur(.6px);
    }

    /* Dust particles (above book) */
    .desk::after{
      content:"";
      position:absolute;
      inset:0;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,.20) 0 2px, transparent 3px),
        radial-gradient(circle at 60% 20%, rgba(255,255,255,.16) 0 1.5px, transparent 3px),
        radial-gradient(circle at 80% 40%, rgba(255,255,255,.14) 0 1.8px, transparent 3px),
        radial-gradient(circle at 35% 70%, rgba(255,255,255,.12) 0 1.2px, transparent 3px);
      background-size: 240px 240px;
      opacity:.35;
      pointer-events:none;
      z-index: 5;
      mix-blend-mode: overlay;
    }

    /* ===== Hardcover book ===== */
    .book3d{
      width: min(980px, 100%);
      aspect-ratio: 16 / 9;
      border-radius: 22px;
      position: relative;
      height: clamp(420px, 55vw, 560px);
      transform: perspective(1200px) rotateX(14deg) rotateZ(-1.4deg) translateY(6px);
      transform-style: preserve-3d;
      will-change: transform;
      filter: saturate(1.03);
      z-index: 2;
    }

    .cover{
      position:absolute;
      inset:0;
      border-radius: 22px;
      background:
        radial-gradient(520px 320px at 25% 10%, rgba(255,255,255,.10), transparent 65%),
        radial-gradient(700px 380px at 70% 30%, rgba(0,0,0,.14), transparent 55%),
        linear-gradient(90deg, #3a2a24 0%, #4a3530 50%, #342520 100%);
      box-shadow: var(--shadow);
      padding: 16px;
    }

    .book3d::before{
      content:"";
      position:absolute;
      inset: 18px 18px 18px 18px;
      border-radius: 18px;
      transform: translateZ(-18px);
      background:
        linear-gradient(180deg, rgba(255,255,255,.30), rgba(0,0,0,.08)),
        repeating-linear-gradient(90deg,
          rgba(0,0,0,.06) 0px, rgba(0,0,0,.06) 1px,
          rgba(255,255,255,.10) 2px, rgba(255,255,255,.10) 3px
        );
      filter: blur(.2px);
      opacity: .92;
      pointer-events:none;
    }

    .book3d::after{
      content:"";
      position:absolute;
      top: 36px; bottom: 36px;
      right: 18px;
      width: 26px;
      border-radius: 14px;
      transform: translateZ(-8px) skewY(-2deg);
      background:
        linear-gradient(90deg, rgba(255,255,255,.05), rgba(255,255,255,.22), rgba(0,0,0,.08));
      opacity: .9;
      pointer-events:none;
    }

    /* Inner spread */
    .spread{
      position:absolute;
      inset: 16px;
      border-radius: 16px;
      background: linear-gradient(90deg, var(--paper2), var(--paper));
      display:grid;
      grid-template-columns: 1fr 1fr;
      overflow:hidden;
      transform: translateZ(2px);
    }

    .spine{
      position:absolute;
      top: 0; bottom: 0;
      left: 50%;
      width: 30px;
      transform: translateX(-50%);
      background: linear-gradient(90deg, rgba(0,0,0,.14), rgba(255,255,255,.20), rgba(0,0,0,.14));
      pointer-events:none;
      opacity:.55;
      z-index: 3;
    }

    .page{
      position: relative;
      padding: var(--pagePadding);
      font-family: var(--font);
      line-height: 1.55;
      background:
        radial-gradient(900px 320px at 50% 0%, rgba(0,0,0,.05), transparent 62%),
        linear-gradient(180deg, rgba(255,255,255,.55), transparent 68%),
        repeating-linear-gradient(180deg,
          rgba(0,0,0,.028) 0px, rgba(0,0,0,.028) 1px,
          transparent 24px, transparent 25px
        );
    }

    .page.left{ border-right: 1px solid rgba(0,0,0,.08); }

    .pageHeader{
      display:flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 8px;
      font-family: var(--ui);
    }
    .pageHeader .label{
      font-weight: 800;
      font-size: 12px;
      color: rgba(0,0,0,.55);
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .pageHeader .pageno{
      font-size: 12px;
      color: var(--muted);
    }

    .content{
      height: calc(100% - 28px);
      overflow:auto;
      padding-right: 6px;
    }

    .editable[contenteditable="true"]{
      outline: none;
      border-radius: 12px;
      padding: 10px;
      background: rgba(255,255,255,.60);
      border: 1px dashed rgba(0,0,0,.18);
      min-height: 220px;
    }

    .editable img{
      max-width: 100%;
      border-radius: 12px;
      display:block;
      margin: 10px auto;
      box-shadow: 0 12px 22px rgba(0,0,0,.14);
    }

    /* ===== Turning overlay ===== */
    .turnPage{
      position:absolute;
      top:0; bottom:0;
      width: 50%;
      left: 50%;
      transform-style: preserve-3d;
      transform-origin: left center;
      pointer-events:none;
      z-index: 20;
      display:none;
      filter: saturate(1.02);

      /* smoother on Safari */
      backface-visibility: hidden;
      will-change: transform;
      transform: translateZ(0);
    }

    .turnFace{
      position:absolute;
      inset:0;
      backface-visibility:hidden;
      overflow:hidden;

      /* real paper surface */
      background:
        radial-gradient(900px 320px at 50% 0%, rgba(0,0,0,.05), transparent 62%),
        linear-gradient(180deg, rgba(255,255,255,.55), transparent 68%),
        repeating-linear-gradient(180deg,
          rgba(0,0,0,.028) 0px, rgba(0,0,0,.028) 1px,
          transparent 24px, transparent 25px
        ),
        linear-gradient(90deg, var(--paper2), var(--paper));

      will-change: transform;
      transform: translateZ(0);
    }

    .turnInner{
      height:100%;
      padding: var(--pagePadding);
      font-family: var(--font);
      line-height: 1.55;
      color: var(--ink);
    }

    .turnInner img{
      max-width: 100%;
      border-radius: 12px;
      display:block;
      margin: 10px auto;
      box-shadow: 0 12px 22px rgba(0,0,0,.14);
    }

    .turnFace.front{ box-shadow: inset -18px 0 26px rgba(0,0,0,.10); }

    .turnFace.back{
      transform: rotateY(180deg) translateZ(0);
      box-shadow: inset 18px 0 28px rgba(0,0,0,.12);
    }

    /* Curl highlight strip */
    .turnPage::after{
      content:"";
      position:absolute;
      top:0; bottom:0;
      width: 16px;
      right: 0;
      background: linear-gradient(90deg,
        rgba(0,0,0,0) 0%,
        rgba(255,255,255,.40) 45%,
        rgba(0,0,0,.10) 100%
      );
      opacity:.88;
      pointer-events:none;
    }

    /* Curved shadow under flipping sheet */
    .turnPage::before{
      content:"";
      position:absolute;
      inset:-30px -10px -30px -10px;
      background:
        radial-gradient(70% 55% at 0% 50%, rgba(0,0,0,.30), rgba(0,0,0,0) 60%),
        radial-gradient(70% 55% at 100% 50%, rgba(0,0,0,.22), rgba(0,0,0,0) 62%);
      opacity:0;
      transform: translateZ(-1px);
      transition: opacity .25s ease;
      pointer-events:none;
    }

    .turning .turnPage{ display:block; }
    .turning .turnPage::before{ opacity:1; }

    @keyframes flipNext {
      0%   { transform: rotateY(0deg); }
      50%  { transform: rotateY(-92deg); }
      100% { transform: rotateY(-180deg); }
    }
    @keyframes flipPrev {
      0%   { transform: rotateY(0deg); }
      50%  { transform: rotateY(92deg); }
      100% { transform: rotateY(180deg); }
    }

    /* slightly faster = smoother */
    .turnNext{ animation: flipNext .62s cubic-bezier(.2,.9,.2,1) forwards; }
    .turnPrev{ animation: flipPrev .62s cubic-bezier(.2,.9,.2,1) forwards; }

    .toolbar{
      display:flex;
      gap: 8px;
      align-items:center;
      flex-wrap: wrap;
      margin: 10px 0 0;
      justify-content:center;
    }

    .toolbar .nav{ display:flex; gap:8px; align-items:center; }

    .status{
      font-size: 12px;
      color: var(--muted);
      font-family: var(--ui);
    }

    @media (max-width: 820px){
      .book3d{
        aspect-ratio: 3 / 4;
        height: clamp(520px, 110vw, 780px);
        transform: perspective(1200px) rotateX(7deg) rotateZ(-0.8deg) translateY(4px);
      }
      .spread{ grid-template-columns: 1fr; }
      .spine{ display:none; }
      .page.left{ border-right:none; border-bottom: 1px solid rgba(0,0,0,.08); }
      .turnPage{ width: 100%; left: 0; transform-origin: left center; }
    }
  </style>
</head>

<body>
<header>
  <div class="bar">
    <div class="title">
      <h1>Sketchbook Diary</h1>
      <span id="modeBadge">View mode</span>
    </div>

    <div class="controls">
      <button id="toggleModeBtn" class="primary">Enter Edit Mode</button>

      <button id="addPageBtn" title="Add a new spread (2 pages)">Add Spread</button>
      <button id="deletePageBtn" class="danger" title="Delete current spread">Delete Spread</button>

      <label class="fileLabel" title="Insert image into the current page">
        Insert Image
        <input id="imgInput" type="file" accept="image/*"/>
      </label>

      <button id="bgmBtn" class="ghost" title="Play / Pause background music">BGM: Off</button>
      <span class="rangeWrap" title="Background music volume">
        <label for="bgmVol">Vol</label>
        <input id="bgmVol" type="range" min="0" max="100" value="35"/>
      </span>

      <button id="exportBtn" class="ghost" title="Export diary as JSON">Export JSON</button>
      <label class="fileLabel" title="Import diary JSON (replaces current)">
        Import JSON
        <input id="importInput" type="application/json" accept="application/json"/>
      </label>

      <button id="resetBtn" class="ghost" title="Reset to demo diary">Reset</button>
    </div>
  </div>
</header>

<main>
  <p class="hint">
    Edit Mode lets you type directly into the pages and insert images (your AI watercolor drawings).
    View Mode is for audience reading. Flip pages with Prev/Next. BGM is optional —
    place <strong>bgm.mp3</strong> in the same folder as this file.
  </p>

  <div class="bookWrap">
    <div class="scene">
      <div class="desk">
        <div class="book3d" role="region" aria-label="Diary book">
          <div class="cover">
            <div class="spread" aria-live="polite">
              <div class="page left">
                <div class="pageHeader">
                  <div class="label">Left Page</div>
                  <div class="pageno" id="leftNo">—</div>
                </div>
                <div class="content">
                  <div id="leftContent"></div>
                </div>
              </div>

              <div class="page right">
                <div class="pageHeader">
                  <div class="label">Right Page</div>
                  <div class="pageno" id="rightNo">—</div>
                </div>
                <div class="content">
                  <div id="rightContent"></div>
                </div>
              </div>

              <div class="spine"></div>

              <div id="turnPage" class="turnPage" aria-hidden="true">
                <div class="turnFace front"></div>
                <div class="turnFace back"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="toolbar">
      <div class="nav">
        <button id="prevBtn" aria-label="Previous pages">Prev</button>
        <button id="nextBtn" aria-label="Next pages">Next</button>
      </div>
      <div class="status" id="statusText">Saved.</div>
    </div>
  </div>
</main>

<audio id="bgm" src="bgm.mp3" loop preload="auto"></audio>

<script>
  const STORAGE_KEY = "sketchbookDiary_hardcover_v31";
  const BGM_KEY = "sketchbookDiary_bgm_v1";

  const demoDiary = {
    title: "Sketchbook Diary",
    pages: [
      `<h2 style="margin-top:0;">Sketchbook Diary</h2>
       <p><em>A fictional young fan’s drawings and thoughts.</em></p>
       <p>Use <strong>Edit Mode</strong> to write diary entries and insert AI watercolor images.</p>
       <p><strong>Tip:</strong> Keep each entry short and emotive. Let the drawings do half the storytelling.</p>`,
      `<h3 style="margin-top:0;">Entry #01</h3>
       <p>Today felt like a race between a lightning bolt and a sleepy animal.</p>
       <p>I drew it so I wouldn’t forget.</p>`,
      `<h3 style="margin-top:0;">Entry #02</h3>
       <p>The TV was loud, but the room was quiet.</p>
       <p>Somehow the calm moments were the loudest.</p>`,
      `<h3 style="margin-top:0;">Entry #03</h3>
       <p>People don’t just watch the season.</p>
       <p>They rewrite it together — facts, feelings, and memes.</p>`,
    ]
  };

  let state = loadState() || structuredClone(demoDiary);
  let isEditMode = false;
  let spreadIndex = 0;

  const leftContent = document.getElementById("leftContent");
  const rightContent = document.getElementById("rightContent");
  const leftNo = document.getElementById("leftNo");
  const rightNo = document.getElementById("rightNo");

  const modeBadge = document.getElementById("modeBadge");
  const toggleModeBtn = document.getElementById("toggleModeBtn");
  const addPageBtn = document.getElementById("addPageBtn");
  const deletePageBtn = document.getElementById("deletePageBtn");
  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");
  const imgInput = document.getElementById("imgInput");
  const exportBtn = document.getElementById("exportBtn");
  const importInput = document.getElementById("importInput");
  const resetBtn = document.getElementById("resetBtn");
  const statusText = document.getElementById("statusText");

  const spreadEl = document.querySelector(".spread");
  const turnPage = document.getElementById("turnPage");

  // BGM
  const bgm = document.getElementById("bgm");
  const bgmBtn = document.getElementById("bgmBtn");
  const bgmVol = document.getElementById("bgmVol");

  function render() {
    const total = state.pages.length;
    if (total % 2 !== 0) state.pages.push("<p></p>");

    const leftIdx = spreadIndex;
    const rightIdx = spreadIndex + 1;

    leftContent.innerHTML = state.pages[leftIdx] ?? "<p></p>";
    rightContent.innerHTML = state.pages[rightIdx] ?? "<p></p>";

    leftNo.textContent = `Page ${leftIdx + 1} / ${state.pages.length}`;
    rightNo.textContent = `Page ${rightIdx + 1} / ${state.pages.length}`;

    setEditable(isEditMode);

    prevBtn.disabled = (spreadIndex <= 0);
    nextBtn.disabled = (spreadIndex + 2 >= state.pages.length);

    modeBadge.textContent = isEditMode ? "Edit mode" : "View mode";
    toggleModeBtn.textContent = isEditMode ? "Exit Edit Mode" : "Enter Edit Mode";
  }

  function setEditable(editable) {
    leftContent.setAttribute("contenteditable", editable ? "true" : "false");
    rightContent.setAttribute("contenteditable", editable ? "true" : "false");

    leftContent.classList.toggle("editable", true);
    rightContent.classList.toggle("editable", true);

    leftContent.style.cursor = editable ? "text" : "default";
    rightContent.style.cursor = editable ? "text" : "default";
  }

  let saveTimer = null;
  function scheduleSave() {
    statusText.textContent = "Saving…";
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      persistCurrentSpread();
      saveState();
      statusText.textContent = "Saved.";
    }, 300);
  }

  function persistCurrentSpread() {
    const leftIdx = spreadIndex;
    const rightIdx = spreadIndex + 1;
    state.pages[leftIdx] = leftContent.innerHTML;
    state.pages[rightIdx] = rightContent.innerHTML;
  }

  function saveState() {
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }catch(e){
      statusText.textContent = "Could not save (storage full).";
    }
  }

  function loadState() {
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : null;
    }catch(e){
      return null;
    }
  }

  toggleModeBtn.addEventListener("click", () => {
    isEditMode = !isEditMode;
    persistCurrentSpread();
    saveState();
    render();
  });

  addPageBtn.addEventListener("click", () => {
    persistCurrentSpread();
    state.pages.push("<h3 style='margin-top:0;'>New Entry</h3><p></p>");
    state.pages.push("<p></p>");
    spreadIndex = state.pages.length - 2;
    render();
    saveState();
  });

  deletePageBtn.addEventListener("click", () => {
    if (state.pages.length <= 2) return;
    persistCurrentSpread();
    state.pages.splice(spreadIndex, 2);
    spreadIndex = Math.min(spreadIndex, state.pages.length - 2);
    spreadIndex = Math.max(0, spreadIndex - (spreadIndex % 2));
    render();
    saveState();
  });

  [leftContent, rightContent].forEach(el => {
    el.addEventListener("input", () => {
      if (!isEditMode) return;
      scheduleSave();
    });
  });

  let lastFocused = leftContent;
  leftContent.addEventListener("focus", () => lastFocused = leftContent);
  rightContent.addEventListener("focus", () => lastFocused = rightContent);
  leftContent.addEventListener("click", () => lastFocused = leftContent);
  rightContent.addEventListener("click", () => lastFocused = rightContent);

  imgInput.addEventListener("change", async (e) => {
    if (!isEditMode) {
      alert("Enter Edit Mode to insert images.");
      imgInput.value = "";
      return;
    }
    const file = e.target.files?.[0];
    if (!file) return;
    const dataUrl = await fileToDataUrl(file);
    insertImageAtCaret(lastFocused, dataUrl);
    scheduleSave();
    imgInput.value = "";
  });

  function fileToDataUrl(file){
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  function insertImageAtCaret(container, src){
    container.focus();
    const img = document.createElement("img");
    img.src = src;
    img.alt = "Inserted image";

    const p = document.createElement("p");
    p.appendChild(img);

    const sel = window.getSelection();
    if (sel && sel.rangeCount > 0){
      const range = sel.getRangeAt(0);
      range.collapse(false);
      range.insertNode(p);
      range.setStartAfter(p);
      range.setEndAfter(p);
      sel.removeAllRanges();
      sel.addRange(range);
    } else {
      container.appendChild(p);
    }
  }

  exportBtn.addEventListener("click", () => {
    persistCurrentSpread();
    const blob = new Blob([JSON.stringify(state, null, 2)], {type: "application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "sketchbook-diary.json";
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  });

  // Import JSON (fix input type if browser is strict)
  importInput.addEventListener("change", async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const text = await file.text();
    try{
      const imported = JSON.parse(text);
      if (!imported.pages || !Array.isArray(imported.pages)) throw new Error("Invalid diary JSON");
      state = imported;
      spreadIndex = 0;
      saveState();
      render();
    }catch(err){
      alert("Import failed: " + err.message);
    }
    importInput.value = "";
  });

  resetBtn.addEventListener("click", () => {
    if (!confirm("Reset diary to demo content? This will overwrite your saved diary.")) return;
    state = structuredClone(demoDiary);
    spreadIndex = 0;
    isEditMode = false;
    saveState();
    render();
  });

  // ---- Smooth page flip: update underlying pages immediately ----
  let isTurning = false;

  function setTurnFaces(frontHTML, backHTML){
    turnPage.querySelector(".front").innerHTML = `<div class="turnInner">${frontHTML}</div>`;
    turnPage.querySelector(".back").innerHTML  = `<div class="turnInner">${backHTML}</div>`;
  }

  function doFlip(direction){
    if (isTurning) return;
    if (direction === "next" && spreadIndex + 2 >= state.pages.length) return;
    if (direction === "prev" && spreadIndex <= 0) return;

    isTurning = true;
    prevBtn.disabled = true;
    nextBtn.disabled = true;

    persistCurrentSpread();

    const isMobile = window.matchMedia("(max-width: 820px)").matches;

    if (direction === "next") {
      const oldRight = state.pages[spreadIndex + 1] ?? "<p></p>";

      const newLeftIdx  = spreadIndex + 2;
      const newRightIdx = spreadIndex + 3;
      const newLeft  = state.pages[newLeftIdx]  ?? "<p></p>";

      // Update underlying spread first (so new content is visible during flip)
      spreadIndex = spreadIndex + 2;
      render();

      if (!isMobile) {
        turnPage.style.left = "50%";
        turnPage.style.width = "50%";
        turnPage.style.transformOrigin = "left center";
      } else {
        turnPage.style.left = "0%";
        turnPage.style.width = "100%";
        turnPage.style.transformOrigin = "left center";
      }

      setTurnFaces(oldRight, newLeft);

      spreadEl.classList.add("turning");
      turnPage.classList.remove("turnPrev");
      turnPage.classList.add("turnNext");

      turnPage.addEventListener("animationend", function handler(){
        turnPage.removeEventListener("animationend", handler);
        spreadEl.classList.remove("turning");
        turnPage.classList.remove("turnNext");

        saveState();
        prevBtn.disabled = (spreadIndex <= 0);
        nextBtn.disabled = (spreadIndex + 2 >= state.pages.length);
        isTurning = false;
      });

    } else {
      const oldLeft = state.pages[spreadIndex] ?? "<p></p>";
      const prevRightIdx = spreadIndex - 1;
      const prevRight = state.pages[prevRightIdx] ?? "<p></p>";

      // Update underlying spread first
      spreadIndex = spreadIndex - 2;
      render();

      if (!isMobile) {
        turnPage.style.left = "0%";
        turnPage.style.width = "50%";
        turnPage.style.transformOrigin = "right center";
      } else {
        turnPage.style.left = "0%";
        turnPage.style.width = "100%";
        turnPage.style.transformOrigin = "right center";
      }

      setTurnFaces(oldLeft, prevRight);

      spreadEl.classList.add("turning");
      turnPage.classList.remove("turnNext");
      turnPage.classList.add("turnPrev");

      turnPage.addEventListener("animationend", function handler(){
        turnPage.removeEventListener("animationend", handler);
        spreadEl.classList.remove("turning");
        turnPage.classList.remove("turnPrev");

        // Restore default overlay placement
        turnPage.style.left = "50%";
        turnPage.style.width = "50%";
        turnPage.style.transformOrigin = "left center";

        saveState();
        prevBtn.disabled = (spreadIndex <= 0);
        nextBtn.disabled = (spreadIndex + 2 >= state.pages.length);
        isTurning = false;
      });
    }
  }

  prevBtn.addEventListener("click", () => doFlip("prev"));
  nextBtn.addEventListener("click", () => doFlip("next"));

  // ---- BGM ----
  function loadBgmState(){
    try{
      const raw = localStorage.getItem(BGM_KEY);
      return raw ? JSON.parse(raw) : { on:false, vol:0.35 };
    }catch(e){
      return { on:false, vol:0.35 };
    }
  }
  function saveBgmState(s){
    try{ localStorage.setItem(BGM_KEY, JSON.stringify(s)); }catch(e){}
  }
  function clamp(n,min,max){ return Math.max(min, Math.min(max, n)); }
  function setBgmButtonText(on){ bgmBtn.textContent = on ? "BGM: On" : "BGM: Off"; }

  const bgmState = loadBgmState();
  bgm.volume = clamp(bgmState.vol ?? 0.35, 0, 1);
  bgmVol.value = Math.round(bgm.volume * 100);
  setBgmButtonText(bgmState.on);

  // Autoplay blocked: if BGM is on, start on the next user click
  document.addEventListener("click", async () => {
    if (!bgmState.on) return;
    if (!bgm.paused) return;
    try{ await bgm.play(); }catch(e){}
  }, { once: true });

  bgmBtn.addEventListener("click", async () => {
    bgmState.on = !bgmState.on;
    setBgmButtonText(bgmState.on);
    saveBgmState(bgmState);

    if (bgmState.on){
      try{ await bgm.play(); }catch(e) {}
    } else {
      bgm.pause();
    }
  });

  bgmVol.addEventListener("input", () => {
    const v = clamp(Number(bgmVol.value) / 100, 0, 1);
    bgm.volume = v;
    bgmState.vol = v;
    saveBgmState(bgmState);
  });

  render();
</script>
</body>
</html>
